<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOC Pipeline Pro | Automated</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .status-pass { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .status-fail { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        .status-pending { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
        .sync-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen pb-10">

    <nav class="bg-slate-900 text-white p-4 shadow-xl sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-lg"><i class="fas fa-microchip"></i></div>
                <h1 class="text-lg font-bold tracking-tight">NOC RECRUITMENT <span class="text-blue-400">PRO</span></h1>
            </div>
            <div id="syncStatus" class="flex items-center gap-3 bg-slate-800 px-4 py-2 rounded-full border border-slate-700">
                <div id="syncDot" class="w-2 h-2 rounded-full bg-green-500"></div>
                <span id="syncText" class="text-xs font-semibold text-slate-300 uppercase tracking-wider">Cloud Connected</span>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6">
        <div class="flex justify-between items-center mb-8">
            <button onclick="openModal('addModal')" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-bold shadow-lg shadow-blue-200 transition-all flex items-center gap-2">
                <i class="fas fa-plus"></i> Add New Candidate
            </button>
            <button onclick="syncToGoogleSheets()" class="bg-white border border-slate-200 text-slate-600 px-5 py-3 rounded-xl hover:bg-slate-50 font-semibold transition-all">
                <i class="fas fa-sync-alt mr-2"></i> Manual Refresh
            </button>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-50 border-b border-slate-200 text-slate-500 text-[11px] font-bold uppercase tracking-widest">
                    <tr>
                        <th class="p-5">Professional Info</th>
                        <th class="p-5 text-center">Tech Screen</th>
                        <th class="p-5 text-center">Ops Rd</th>
                        <th class="p-5 text-center">Mgmt Rd</th>
                        <th class="p-5 text-center">CTO Rd</th>
                        <th class="p-5 text-center">Client Final</th>
                        <th class="p-5 text-right">Delete</th>
                    </tr>
                </thead>
                <tbody id="candidateTableBody" class="divide-y divide-slate-100">
                    </tbody>
            </table>
        </div>
    </main>

    <div id="candidateModal" class="fixed inset-0 bg-slate-900/60 hidden flex items-center justify-center z-[100] backdrop-blur-sm p-4">
        <div class="bg-white rounded-2xl w-full max-w-md shadow-2xl overflow-hidden">
            <div class="p-6 border-b flex justify-between items-center bg-slate-50">
                <h3 id="candModalTitle" class="text-xl font-bold text-slate-800">Candidate Details</h3>
                <button onclick="closeModal('candidateModal')" class="text-slate-400 hover:text-slate-600"><i class="fas fa-times"></i></button>
            </div>
            <form id="candForm" class="p-6 space-y-4">
                <input type="hidden" id="editIdx">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Full Name</label>
                    <input type="text" id="candName" required class="w-full mt-1 p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Experience / Title</label>
                    <input type="text" id="candExp" class="w-full mt-1 p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Email Address</label>
                    <input type="email" id="candEmail" class="w-full mt-1 p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Resume Link</label>
                    <input type="url" id="candResume" class="w-full mt-1 p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <button type="submit" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold hover:bg-black transition-all">SAVE & SYNC</button>
            </form>
        </div>
    </div>

    <div id="feedbackModal" class="fixed inset-0 bg-slate-900/60 hidden flex items-center justify-center z-[100] backdrop-blur-sm p-4">
        <div class="bg-white rounded-2xl w-full max-w-md shadow-2xl p-6">
            <h3 id="fbTitle" class="text-lg font-bold mb-4 text-slate-800">Stage Feedback</h3>
            <textarea id="fbText" class="w-full h-40 p-4 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none mb-4" placeholder="Enter interview notes..."></textarea>
            <div class="flex gap-3">
                <button onclick="saveFeedback()" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold">Save Feedback</button>
                <button onclick="closeModal('feedbackModal')" class="flex-1 bg-slate-100 text-slate-600 py-3 rounded-xl font-semibold">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // UPDATED GOOGLE SCRIPT URL
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxzQbOeIDisE6oUpZYGh0HsW9sDODGyJIBWMXxUkbRV5FqK_4L4lGllWzb3mr59geNPlA/exec';
        
        let candidates = JSON.parse(localStorage.getItem('noc_candidates')) || [];
        let activeFbIdx = null;
        let activeFbStage = null;

        async function syncToGoogleSheets() {
            const dot = document.getElementById('syncDot');
            const txt = document.getElementById('syncText');
            dot.className = "w-2 h-2 rounded-full bg-yellow-500 sync-pulse";
            txt.innerText = "Syncing...";

            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(candidates)
                });
                dot.className = "w-2 h-2 rounded-full bg-green-500";
                txt.innerText = "Cloud Connected";
            } catch (e) {
                dot.className = "w-2 h-2 rounded-full bg-red-500";
                txt.innerText = "Sync Failed";
            }
        }

        function save() {
            localStorage.setItem('noc_candidates', JSON.stringify(candidates));
            render();
            syncToGoogleSheets();
        }

        function render() {
            const body = document.getElementById('candidateTableBody');
            body.innerHTML = '';
            candidates.forEach((c, idx) => {
                const row = document.createElement('tr');
                row.className = "hover:bg-slate-50 transition-all";
                row.innerHTML = `
                    <td class="p-5">
                        <div class="flex items-center gap-2">
                            <span class="font-bold text-slate-800">${c.name}</span>
                            <button onclick="openEditModal(${idx})" class="text-slate-300 hover:text-blue-500 text-xs"><i class="fas fa-pen"></i></button>
                        </div>
                        <div class="text-[10px] text-slate-400 mt-1">${c.exp} | <a href="${c.resume}" target="_blank" class="text-blue-500 font-bold hover:underline">Resume</a></div>
                    </td>
                    ${['s1','s2','s3','s4','s5'].map(s => `
                        <td class="p-5 text-center">
                            <select onchange="updateStage(${idx}, '${s}', this.value)" 
                                    class="text-[10px] font-bold px-3 py-1 rounded-full outline-none mb-1 status-${c.stages[s].toLowerCase()}">
                                <option value="Pending" ${c.stages[s] === 'Pending' ? 'selected' : ''}>PENDING</option>
                                <option value="Pass" ${c.stages[s] === 'Pass' ? 'selected' : ''}>PASS</option>
                                <option value="Fail" ${c.stages[s] === 'Fail' ? 'selected' : ''}>FAIL</option>
                            </select>
                            <div class="flex items-center justify-center gap-2 mt-1">
                                <button onclick="openFeedback(${idx}, '${s}')" class="text-slate-300 hover:text-blue-500 transition-colors">
                                    <i class="fas fa-comment-dots text-xs"></i>
                                </button>
                                <span class="text-[8px] font-bold text-slate-400 uppercase">${c.dates[s] || ''}</span>
                            </div>
                        </td>
                    `).join('')}
                    <td class="p-5 text-right">
                        <button onclick="deleteCandidate(${idx})" class="text-slate-200 hover:text-red-500 transition-colors">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </td>
                `;
                body.appendChild(row);
            });
        }

        // Add/Edit Candidate Logic
        document.getElementById('candForm').onsubmit = (e) => {
            e.preventDefault();
            const idx = document.getElementById('editIdx').value;
            const data = {
                name: document.getElementById('candName').value,
                exp: document.getElementById('candExp').value,
                email: document.getElementById('candEmail').value,
                resume: document.getElementById('candResume').value,
            };

            if(idx === "") {
                candidates.unshift({
                    id: Date.now(), ...data,
                    stages: {s1:'Pending',s2:'Pending',s3:'Pending',s4:'Pending',s5:'Pending'},
                    dates: {s1:'',s2:'',s3:'',s4:'',s5:''},
                    feedback: {s1:'',s2:'',s3:'',s4:'',s5:''},
                    overall_notes: ''
                });
            } else {
                candidates[idx] = {...candidates[idx], ...data};
            }
            closeModal('candidateModal');
            save();
        };

        function openEditModal(idx) {
            const c = candidates[idx];
            document.getElementById('editIdx').value = idx;
            document.getElementById('candName').value = c.name;
            document.getElementById('candExp').value = c.exp;
            document.getElementById('candEmail').value = c.email;
            document.getElementById('candResume').value = c.resume;
            openModal('candidateModal');
        }

        function openModal(id) { 
            if(id === 'addModal') {
                document.getElementById('candForm').reset();
                document.getElementById('editIdx').value = "";
                document.getElementById('candidateModal').classList.remove('hidden');
            } else {
                document.getElementById(id).classList.remove('hidden'); 
            }
        }

        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        function updateStage(idx, stage, val) {
            candidates[idx].stages[stage] = val;
            if(val !== 'Pending') candidates[idx].dates[stage] = new Date().toLocaleDateString('en-GB', {day:'2-digit', month:'short'});
            save();
        }

        function openFeedback(idx, stage) {
            activeFbIdx = idx;
            activeFbStage = stage;
            document.getElementById('fbTitle').innerText = `${candidates[idx].name} - Stage ${stage.toUpperCase()}`;
            document.getElementById('fbText').value = candidates[idx].feedback[stage] || '';
            openModal('feedbackModal');
        }

        function saveFeedback() {
            candidates[activeFbIdx].feedback[activeFbStage] = document.getElementById('fbText').value;
            closeModal('feedbackModal');
            save();
        }

        function deleteCandidate(idx) {
            if(confirm('Permanently remove this candidate?')) {
                candidates.splice(idx, 1);
                save();
            }
        }

        render();
    </script>
</body>
</html>
