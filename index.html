<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOC Recruitment Pro | Automated Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .status-pass { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .status-fail { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        .status-pending { background: #fef9c3; color: #854d0e; border: 1px solid #fef08a; }
        .sync-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <nav class="bg-slate-900 text-white p-4 shadow-2xl sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-blue-500 p-2 rounded-lg">
                    <i class="fas fa-network-wired text-white text-xl"></i>
                </div>
                <div>
                    <h1 class="text-lg font-bold leading-none">NOC PIPELINE <span class="text-blue-400">PRO</span></h1>
                    <p class="text-[10px] text-slate-400 uppercase tracking-widest mt-1">Automated Sheet Sync Active</p>
                </div>
            </div>
            <div id="syncStatus" class="flex items-center gap-3 px-4 py-2 bg-slate-800 rounded-full border border-slate-700">
                <div id="syncDot" class="w-2.5 h-2.5 rounded-full bg-green-500"></div>
                <span id="syncText" class="text-xs font-medium text-slate-300">System Ready</span>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <p class="text-slate-500 text-xs font-bold uppercase mb-1">Total Pool</p>
                <h2 id="stat-total" class="text-3xl font-black text-slate-800">0</h2>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <p class="text-slate-500 text-xs font-bold uppercase mb-1">In Progress</p>
                <h2 id="stat-active" class="text-3xl font-black text-blue-600">0</h2>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <p class="text-slate-500 text-xs font-bold uppercase mb-1">Passed (S5)</p>
                <h2 id="stat-passed" class="text-3xl font-black text-green-600">0</h2>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <p class="text-slate-500 text-xs font-bold uppercase mb-1">Dropped</p>
                <h2 id="stat-failed" class="text-3xl font-black text-red-600">0</h2>
            </div>
        </div>

        <div class="flex flex-wrap justify-between items-center gap-4 mb-6">
            <button onclick="openModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-bold transition-all shadow-lg hover:shadow-blue-200 flex items-center gap-2">
                <i class="fas fa-user-plus"></i> NEW CANDIDATE
            </button>
            <div class="flex gap-2">
                <button onclick="syncToGoogleSheets()" class="bg-white border border-slate-300 text-slate-700 px-4 py-3 rounded-xl hover:bg-slate-50 transition-all flex items-center gap-2 font-semibold">
                    <i class="fas fa-cloud-upload-alt text-blue-500"></i> Manual Sync
                </button>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50 text-slate-500 uppercase text-[11px] font-bold tracking-wider">
                        <tr>
                            <th class="p-5 border-b">Candidate Info</th>
                            <th class="p-5 border-b text-center">S1 (Tech)</th>
                            <th class="p-5 border-b text-center">S2 (Ops)</th>
                            <th class="p-5 border-b text-center">S3 (Mgmt)</th>
                            <th class="p-5 border-b text-center">S4 (CTO)</th>
                            <th class="p-5 border-b text-center">S5 (Client)</th>
                            <th class="p-5 border-b text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody id="candidateTableBody" class="divide-y divide-slate-100">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="modal" class="fixed inset-0 bg-slate-900/60 hidden flex items-center justify-center z-[100] p-4 backdrop-blur-sm">
        <div class="bg-white rounded-3xl w-full max-w-lg shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-200">
            <div class="p-6 border-b flex justify-between items-center bg-slate-50">
                <h3 class="text-xl font-bold text-slate-800">Add New Professional</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600"><i class="fas fa-times text-xl"></i></button>
            </div>
            <form id="candidateForm" class="p-8 space-y-5">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Full Name</label>
                    <input type="text" id="name" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Experience</label>
                        <input type="text" id="exp" placeholder="e.g. 5 Years" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Email</label>
                        <input type="email" id="email" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Resume Link (G-Drive)</label>
                    <input type="url" id="resume" placeholder="https://..." class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-200 transition-all">
                    SAVE & SYNC TO SHEET
                </button>
            </form>
        </div>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzhREhz_0UIGHher2N0KHGN6CIxU7uh8o34nSgO3aop9mADlLnplXxyXByW843Dj0hGwQ/exec';
        
        let candidates = JSON.parse(localStorage.getItem('noc_candidates')) || [];

        // Global Automation: Sync to Google Sheets
        async function syncToGoogleSheets() {
            const dot = document.getElementById('syncDot');
            const txt = document.getElementById('syncText');
            
            dot.className = "w-2.5 h-2.5 rounded-full bg-yellow-500 sync-pulse";
            txt.innerText = "Syncing to Sheets...";

            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    body: JSON.stringify(candidates)
                });
                
                setTimeout(() => {
                    dot.className = "w-2.5 h-2.5 rounded-full bg-green-500";
                    txt.innerText = "All Data Secured";
                }, 1000);
            } catch (e) {
                dot.className = "w-2.5 h-2.5 rounded-full bg-red-500";
                txt.innerText = "Sync Error";
            }
        }

        function save() {
            localStorage.setItem('noc_candidates', JSON.stringify(candidates));
            render();
            syncToGoogleSheets(); // Automatic Trigger
        }

        // Modal Logic
        function openModal() { document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        document.getElementById('candidateForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const newCand = {
                id: Date.now(),
                name: document.getElementById('name').value,
                exp: document.getElementById('exp').value,
                email: document.getElementById('email').value,
                resume: document.getElementById('resume').value,
                stages: { s1: 'Pending', s2: 'Pending', s3: 'Pending', s4: 'Pending', s5: 'Pending' },
                dates: { s1: '', s2: '', s3: '', s4: '', s5: '' },
                feedback: { s1: '', s2: '', s3: '', s4: '', s5: '' },
                overall_notes: ''
            };
            candidates.unshift(newCand);
            save();
            closeModal();
            e.target.reset();
        });

        function updateStage(index, stage, status) {
            candidates[index].stages[stage] = status;
            if(status !== 'Pending' && !candidates[index].dates[stage]) {
                candidates[index].dates[stage] = new Date().toLocaleDateString();
            }
            save();
        }

        function deleteCandidate(index) {
            if(confirm('Remove this candidate?')) {
                candidates.splice(index, 1);
                save();
            }
        }

        function render() {
            const body = document.getElementById('candidateTableBody');
            body.innerHTML = '';

            let passed = 0, failed = 0;

            candidates.forEach((c, idx) => {
                if(c.stages.s5 === 'Pass') passed++;
                const isFailed = Object.values(c.stages).includes('Fail');
                if(isFailed) failed++;

                const row = document.createElement('tr');
                row.className = "hover:bg-slate-50 transition-colors";
                row.innerHTML = `
                    <td class="p-5">
                        <div class="font-bold text-slate-800">${c.name}</div>
                        <div class="text-xs text-slate-500">${c.exp} | <a href="${c.resume}" target="_blank" class="text-blue-500 underline">Resume</a></div>
                    </td>
                    ${['s1','s2','s3','s4','s5'].map(s => `
                        <td class="p-5 text-center">
                            <select onchange="updateStage(${idx}, '${s}', this.value)" 
                                    class="text-[11px] font-bold px-2 py-1 rounded-md outline-none cursor-pointer status-${c.stages[s].toLowerCase()}">
                                <option value="Pending" ${c.stages[s] === 'Pending' ? 'selected' : ''}>PENDING</option>
                                <option value="Pass" ${c.stages[s] === 'Pass' ? 'selected' : ''}>PASS</option>
                                <option value="Fail" ${c.stages[s] === 'Fail' ? 'selected' : ''}>FAIL</option>
                            </select>
                            <div class="text-[9px] text-slate-400 mt-1">${c.dates[s] || '--'}</div>
                        </td>
                    `).join('')}
                    <td class="p-5 text-right">
                        <button onclick="deleteCandidate(${idx})" class="text-slate-300 hover:text-red-500 transition-colors">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </td>
                `;
                body.appendChild(row);
            });

            document.getElementById('stat-total').innerText = candidates.length;
            document.getElementById('stat-passed').innerText = passed;
            document.getElementById('stat-failed').innerText = failed;
            document.getElementById('stat-active').innerText = candidates.length - passed - failed;
        }

        render();
    </script>
</body>
</html>
