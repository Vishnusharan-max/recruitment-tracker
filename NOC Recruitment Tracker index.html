<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOC Recruitment Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0f0f;--surface:#1a1a1a;--border:#2e2e2e;--accent:#c8f563;--text:#f0f0f0;--muted:#777;--pass:#4ade80;--fail:#f87171;--pending:#fbbf24;--font-head:'Syne',sans-serif;--font-mono:'DM Mono',monospace;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font-mono);font-size:13px;min-height:100vh;}
.header{padding:1.5rem 2rem; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; background:#111;}
.btn{padding:8px 16px; border-radius:6px; cursor:pointer; border:1px solid var(--border); background:var(--surface); color:var(--text); font-family:inherit; transition:0.2s;}
.btn-accent{background:var(--accent); color:#000; font-weight:700; border:none;}
/* DASHBOARD */
.dashboard{display:grid; grid-template-columns:repeat(auto-fit, minmax(150px, 1fr)); background:var(--surface); border-bottom:1px solid var(--border);}
.stat-card{padding:1.5rem; border-right:1px solid var(--border); text-align:center;}
.stat-label{font-size:9px; color:var(--muted); text-transform:uppercase; margin-bottom:5px; display:block;}
.stat-val{font-size:24px; font-family:var(--font-head); font-weight:700;}
/* TABLE */
table{width:100%; border-collapse:collapse;}
th{padding:12px; text-align:left; font-size:10px; color:var(--muted); text-transform:uppercase; border-bottom:1px solid var(--border); background:#151515;}
td{padding:12px; border-bottom:1px solid var(--border);}
.pill{padding:3px 8px; border-radius:12px; font-size:9px; font-weight:700; text-transform:uppercase;}
.pill-pass{background:#052010; color:var(--pass);}
.pill-fail{background:#1f0505; color:var(--fail);}
.pill-pending{background:#1a1200; color:var(--pending);}
/* MODAL & DRAWER */
.m-overlay, .d-overlay{display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:100; align-items:center; justify-content:center; backdrop-filter: blur(4px);}
.m-overlay.open, .d-overlay.open{display:flex;}
.modal{background:var(--surface); padding:2rem; border-radius:12px; width:400px; border:1px solid var(--border);}
.drawer{position:fixed; right:0; top:0; bottom:0; width:420px; background:var(--surface); border-left:1px solid var(--border); transform:translateX(100%); transition:0.3s; padding:30px; z-index:200; overflow-y:auto;}
.drawer.open{transform:translateX(0);}
.fg{margin-bottom:15px;}
.fg label{display:block; font-size:10px; color:var(--muted); margin-bottom:5px;}
input, textarea, select{width:100%; padding:10px; background:#000; border:1px solid var(--border); color:#fff; border-radius:4px; font-family:inherit;}
</style>
</head>
<body>

<div class="header">
    <div>
        <h1 style="color:var(--accent)">NOC PIPELINE PRO</h1>
        <p style="font-size:10px; color:var(--muted)">LIVE RECRUITMENT STATUS</p>
    </div>
    <div style="display:flex; gap:10px;">
        <button class="btn" style="background:#1d4ed8; color:#fff" onclick="syncToGoogleSheets()">☁ Sync to Sheets</button>
        <button class="btn btn-accent" onclick="openModal()">+ Add Candidate</button>
    </div>
</div>

<div class="dashboard" id="dashboard">
    <div class="stat-card"><span class="stat-label">Total Pool</span><span id="stat-total" class="stat-val">0</span></div>
    <div class="stat-card"><span class="stat-label">Active Flow</span><span id="stat-active" class="stat-val" style="color:var(--pending)">0</span></div>
    <div class="stat-card"><span class="stat-label">Completed/Pass</span><span id="stat-pass" class="stat-val" style="color:var(--pass)">0</span></div>
    <div class="stat-card"><span class="stat-label">Rejected</span><span id="stat-fail" class="stat-val" style="color:var(--fail)">0</span></div>
</div>

<table>
    <thead>
        <tr>
            <th>Candidate</th><th>Resume</th><th>S1 Tech</th><th>S2 Ops</th><th>S3 Mgmt</th><th>S4 CTO</th><th>S5 Client</th><th>Detailed Status</th><th>Action</th>
        </tr>
    </thead>
    <tbody id="tbody"></tbody>
</table>

<div class="m-overlay" id="m-overlay">
    <div class="modal">
        <h2 style="font-family:var(--font-head); margin-bottom:20px;">New Candidate</h2>
        <div class="fg"><label>Full Name</label><input id="f-name"></div>
        <div class="fg"><label>Experience</label><input id="f-exp"></div>
        <div class="fg"><label>Email</label><input id="f-email"></div>
        <div class="fg"><label>Resume Link (G-Drive)</label><input id="f-resume"></div>
        <button class="btn btn-accent" style="width:100%" onclick="saveCandidate()">Create Entry</button>
        <button class="btn" style="width:100%; margin-top:10px; border:none;" onclick="closeModal()">Cancel</button>
    </div>
</div>

<div class="d-overlay" id="d-overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
    <h2 id="d-name" style="font-family:var(--font-head); color:var(--accent)">Notes & Dates</h2>
    <div id="stage-editors" style="margin-top:20px"></div>
    <div class="fg">
        <label>Resume Link</label>
        <input id="d-resume">
    </div>
    <div class="fg">
        <label>Final Summary</label>
        <textarea id="overall-notes" style="height:100px"></textarea>
    </div>
    <button class="btn btn-accent" style="width:100%" onclick="saveFeedback()">Save All Changes</button>
</div>

<script>
// REPLACE WITH YOUR WEB APP URL
const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyuVXKC0hulADY7eAke400cis7ldQZn-Bpv4vvaJgdIuKTzvvHI96GZhPRkSxBNBeJS/exec';

const STAGES = ['s1', 's2', 's3', 's4', 's5'];
const SNAMES = ['Tech Screen', 'Ops Round', 'Mgmt Round', 'CTO Round', 'Client Final'];

let candidates = JSON.parse(localStorage.getItem('noc_pro_final') || '[]');
let currentId = null;

function saveLocal() {
    localStorage.setItem('noc_pro_final', JSON.stringify(candidates));
    renderAll();
}

function renderAll() {
    renderTable();
    updateDashboard();
}

function updateDashboard() {
    const total = candidates.length;
    const pass = candidates.filter(c => c.stages.s5 === 'Pass').length;
    const fail = candidates.filter(c => Object.values(c.stages).includes('Fail')).length;
    document.getElementById('stat-total').innerText = total;
    document.getElementById('stat-active').innerText = total - pass - fail;
    document.getElementById('stat-pass').innerText = pass;
    document.getElementById('stat-fail').innerText = fail;
}

function renderTable() {
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = candidates.map(c => {
        // DETAILED STATUS LOGIC
        let detailedStatus = "Pending";
        let statusColor = "pending";
        const failIndex = STAGES.findIndex(s => c.stages[s] === 'Fail');
        
        if (failIndex !== -1) {
            detailedStatus = `Fail (${SNAMES[failIndex]})`;
            statusColor = "fail";
        } else {
            const lastPassIndex = STAGES.map(s => c.stages[s]).lastIndexOf('Pass');
            if (lastPassIndex === 4) {
                detailedStatus = "Passed All";
                statusColor = "pass";
            } else if (lastPassIndex !== -1) {
                detailedStatus = `Active (${SNAMES[lastPassIndex + 1]})`;
            } else if (Object.values(c.stages).some(v => v !== "")) {
                detailedStatus = `Active (${SNAMES[0]})`;
            }
        }

        const resLink = c.resume ? `<a href="${c.resume}" target="_blank" style="color:var(--accent); text-decoration:none; font-size:10px; border:1px solid #444; padding:2px 5px; border-radius:4px;">View</a>` : `<span style="color:#333">-</span>`;
        
        return `
            <tr>
                <td><b>${c.name}</b><br><small style="color:var(--muted)">${c.exp}</small></td>
                <td>${resLink}</td>
                ${STAGES.map(s => `
                    <td>
                        <select onchange="updateStage(${c.id},'${s}',this.value)" style="width:70px; font-size:10px;">
                            <option value="" ${c.stages[s]===''?'selected':''}>-</option>
                            <option value="Pass" ${c.stages[s]==='Pass'?'selected':''}>Pass</option>
                            <option value="Fail" ${c.stages[s]==='Fail'?'selected':''}>Fail</option>
                        </select>
                        <div style="font-size:9px; color:#555; margin-top:4px">${c.dates[s] || 'No Date'}</div>
                    </td>
                `).join('')}
                <td><span class="pill pill-${statusColor}">${detailedStatus}</span></td>
                <td><button class="btn" style="padding:4px 8px; font-size:10px" onclick="openDrawer(${c.id})">Details</button></td>
                <td><button class="btn" style="border:none; color:#444" onclick="deleteCand(${c.id})">✕</button></td>
            </tr>
        `;
    }).join('');
}

function openModal() { document.getElementById('m-overlay').classList.add('open'); }
function closeModal() { document.getElementById('m-overlay').classList.remove('open'); }

function saveCandidate() {
    const name = document.getElementById('f-name').value;
    if(!name) return alert("Name required");
    candidates.push({
        id: Date.now(),
        name,
        exp: document.getElementById('f-exp').value,
        email: document.getElementById('f-email').value,
        resume: document.getElementById('f-resume').value,
        stages: {s1:'',s2:'',s3:'',s4:'',s5:''},
        dates: {s1:'',s2:'',s3:'',s4:'',s5:''},
        feedback: {s1:'',s2:'',s3:'',s4:'',s5:''},
        overall_notes: ''
    });
    saveLocal();
    closeModal();
    ['f-name','f-exp','f-email','f-resume'].forEach(i => document.getElementById(i).value = '');
}

function updateStage(id, s, v) {
    const c = candidates.find(x => x.id === id);
    c.stages[s] = v;
    saveLocal();
}

function openDrawer(id) {
    currentId = id;
    const c = candidates.find(x => x.id === id);
    document.getElementById('d-name').innerText = c.name;
    document.getElementById('d-resume').value = c.resume || '';
    document.getElementById('overall-notes').value = c.overall_notes || '';
    document.getElementById('stage-editors').innerHTML = STAGES.map((s, i) => `
        <div style="margin-bottom:15px; background:rgba(255,255,255,0.03); padding:10px; border-radius:6px; border:1px solid var(--border)">
            <label style="font-size:10px; color:var(--accent)">${SNAMES[i]}</label>
            <input type="date" id="date-${s}" value="${c.dates[s] || ''}" style="margin:5px 0">
            <textarea id="feed-${s}" placeholder="Feedback...">${c.feedback[s] || ''}</textarea>
        </div>
    `).join('');
    document.getElementById('d-overlay').classList.add('open');
    document.getElementById('drawer').classList.add('open');
}

function saveFeedback() {
    const c = candidates.find(x => x.id === currentId);
    c.resume = document.getElementById('d-resume').value;
    STAGES.forEach(s => {
        c.dates[s] = document.getElementById(`date-${s}`).value;
        c.feedback[s] = document.getElementById(`feed-${s}`).value;
    });
    c.overall_notes = document.getElementById('overall-notes').value;
    saveLocal();
    closeDrawer();
}

function closeDrawer() { 
    document.getElementById('d-overlay').classList.remove('open');
    document.getElementById('drawer').classList.remove('open'); 
}

function deleteCand(id) {
    if(confirm("Delete candidate?")) {
        candidates = candidates.filter(x => x.id !== id);
        saveLocal();
    }
}

async function syncToGoogleSheets() {
    const btn = event.target;
    btn.innerText = "⌛ Syncing...";
    try {
        await fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(candidates)
        });
        alert("✅ Synced successfully!");
    } catch (e) {
        alert("Sync error.");
    } finally {
        btn.innerText = "☁ Sync to Sheets";
    }
}

renderAll();
</script>
</body>
</html>
